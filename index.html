<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kontoplan — Norwegian accounting reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #14283D; --paper: #F7F6F1; --paper-raised: #FFFFFF;
  --fjord: #2C6E8E; --fjord-dark: #1F5063; --slate: #5B6774; --slate-light: #8B94A0;
  --border: #E1DFD6; --border-strong: #C9C6B9;
  --amber: #C97A2E; --amber-bg: #FBEEE1; --rust: #B34A3A; --rust-bg: #FBE9E6;
  --forest: #3B6E52; --forest-bg: #E9F1EC; --radius: 6px; --radius-lg: 10px;
  --font-display: 'Fraunces', serif; --font-body: 'Inter', -apple-system, sans-serif; --font-mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; }
[hidden] { display: none !important; }
body { margin: 0; font-family: var(--font-body); background: var(--paper); color: var(--ink); font-size: 15px; line-height: 1.55; }
h1, h2, h3 { font-family: var(--font-display); font-weight: 600; margin: 0; color: var(--ink); }
h1 { font-size: 28px; } h2 { font-size: 20px; } h3 { font-size: 16px; }
.muted { color: var(--slate); } .small { font-size: 13px; }
a { color: var(--fjord); text-decoration: none; }
input, select, textarea {
  font-family: var(--font-body); font-size: 14px; padding: 9px 12px;
  border: 1px solid var(--border-strong); border-radius: var(--radius);
  background: var(--paper-raised); color: var(--ink); width: 100%;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--fjord); box-shadow: 0 0 0 3px rgba(44,110,142,0.15); }
label { display: block; font-size: 13px; font-weight: 500; margin: 14px 0 6px; color: var(--ink); }
button { font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; border-radius: var(--radius); padding: 9px 16px; border: none; }
.btn-primary { background: var(--fjord); color: #fff; width: 100%; margin-top: 20px; }
.btn-primary:hover { background: var(--fjord-dark); }
.btn-ghost { background: transparent; border: 1px solid var(--border-strong); color: var(--ink); }
.btn-ghost:hover { background: var(--paper-raised); }
.error-text { color: var(--rust); font-size: 13px; margin-top: 10px; }
.stamp { font-family: var(--font-mono); font-weight: 500; font-size: 15px; color: var(--ink); border-left: 3px solid var(--fjord); padding-left: 8px; display: inline-block; }
.stamp.small { font-size: 12px; padding-left: 6px; border-left-width: 2px; }
.stamp.large { font-size: 24px; padding-left: 10px; }
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--paper); }
.login-card { width: 360px; padding: 40px 36px; background: var(--paper-raised); border: 1px solid var(--border); border-radius: var(--radius-lg); }
.login-mark { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.mark-label { font-family: var(--font-display); font-weight: 600; font-size: 16px; }
.login-card h1 { margin-bottom: 6px; }
.app-shell { min-height: 100vh; display: flex; flex-direction: column; }
.topbar { display: flex; align-items: center; gap: 20px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--paper-raised); }
.brand { display: flex; align-items: center; gap: 8px; min-width: 160px; }
.brand-name { font-family: var(--font-display); font-weight: 600; font-size: 16px; }
#global-search { flex: 1; max-width: 520px; }
.topbar-user { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.body-layout { display: flex; flex: 1; }
.sidebar { width: 190px; padding: 20px 12px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }
.sidebar a { color: var(--slate); font-size: 14px; padding: 9px 12px; border-radius: var(--radius); display: flex; align-items: center; gap: 10px; }
.sidebar a:hover { background: var(--paper); }
.sidebar a.active { background: #E9F1F5; color: var(--fjord-dark); font-weight: 500; }
.content { flex: 1; padding: 28px 32px; max-width: 1080px; }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0 28px; }
.stat-card { background: var(--paper-raised); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
.stat-card .value { font-family: var(--font-display); font-size: 26px; font-weight: 600; margin-top: 4px; }
.card { background: var(--paper-raised); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 12px; color: var(--slate); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); }
td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
tr.row-link { cursor: pointer; }
tr.row-link:hover { background: #FBFAF6; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; display: inline-block; }
.badge-low { background: var(--forest-bg); color: var(--forest); }
.badge-medium { background: var(--amber-bg); color: var(--amber); }
.badge-high { background: var(--rust-bg); color: var(--rust); }
.badge-class { background: #E9F1F5; color: var(--fjord-dark); }
.toolbar { display: flex; gap: 10px; margin-bottom: 16px; }
.toolbar input[type="search"] { flex: 1; }
.chip-row { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
.chip { font-size: 12px; padding: 5px 12px; border: 1px solid var(--border-strong); border-radius: 20px; color: var(--slate); cursor: pointer; }
.chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 20px; }
.section-label { font-size: 12px; color: var(--slate); font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.03em; }
.list-item { font-size: 13px; padding: 10px 12px; background: var(--paper); border-radius: var(--radius); margin-bottom: 6px; }
.law-ref { font-size: 12px; color: var(--fjord-dark); margin-top: 4px; }
.empty-state { text-align: center; padding: 48px 20px; color: var(--slate); }
.empty-state h3 { margin-bottom: 6px; color: var(--ink); }
.modal-overlay { position: fixed; inset: 0; background: rgba(20,40,61,0.35); display: flex; align-items: center; justify-content: center; z-index: 50; }
.modal { background: var(--paper-raised); border-radius: var(--radius-lg); padding: 24px 28px; width: 420px; max-height: 80vh; overflow-y: auto; }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-mark">
      <span class="stamp">1920</span>
      <span class="mark-label">Kontoplan</span>
    </div>
    <h1>Sign in</h1>
    <p class="muted">Access is by invitation only. Ask your admin if you don't have an account yet.</p>
    <form id="login-form">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="name@company.no" required />
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" required />
      <button type="submit" class="btn-primary" id="login-submit">Sign in</button>
      <p id="login-error" class="error-text" hidden></p>
    </form>
  </div>
</div>

<div id="app-shell" class="app-shell" hidden>
  <header class="topbar">
    <div class="brand">
      <span class="stamp small">1920</span>
      <span class="brand-name">Kontoplan</span>
    </div>
    <input type="search" id="global-search" placeholder="Search accounts, companies, laws, or procedures" />
    <div class="topbar-user">
      <span id="user-email" class="muted small"></span>
      <button id="logout-btn" class="btn-ghost small">Sign out</button>
    </div>
  </header>
  <div class="body-layout">
    <nav class="sidebar" id="sidebar">
      <a href="#/home" data-route="home">Home</a>
      <a href="#/accounts" data-route="accounts">Accounts</a>
      <a href="#/companies" data-route="companies">Companies</a>
      <a href="#/procedures" data-route="procedures">Procedures</a>
      <a href="#/laws" data-route="laws">Laws</a>
      <a href="#/learn" data-route="learn">Learn</a>
      <a href="#/knowledge" data-route="knowledge">Knowledge log</a>
      <a href="#/admin" data-route="admin" id="nav-admin">Admin</a>
    </nav>
    <main class="content" id="view-root"></main>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://lgdquwndwcnvaildaatq.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_jpx4rxaHPRdOV3hrH4VEew_kjyF9kyG';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentProfile = null;
function getProfile() { return currentProfile; }
async function loadProfile(userId) {
  const { data, error } = await supabase.from('profiles').select('*').eq('id', userId).single();
  if (error) { console.error('Could not load profile', error); return null; }
  currentProfile = data;
  return data;
}
async function signIn(email, password) {
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) throw error;
  const profile = await loadProfile(data.user.id);
  if (!profile || profile.is_active === false) {
    await supabase.auth.signOut();
    throw new Error('Your account has been deactivated. Contact your admin.');
  }
  return profile;
}
async function signOut() { await supabase.auth.signOut(); currentProfile = null; }
async function getSession() { const { data } = await supabase.auth.getSession(); return data.session; }
function hasRole(minRole) {
  if (!currentProfile) return false;
  const role = currentProfile.role;
  if (role === 'admin') return true;
  if (minRole === 'senior') return role === 'senior';
  if (minRole === 'learner') return role === 'senior' || role === 'learner';
  if (minRole === 'viewer') return true;
  return false;
}
function isAdmin() { return currentProfile?.role === 'admin'; }

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}
function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  if (days === 0) return 'today';
  if (days === 1) return '1 day ago';
  return `${days} days ago`;
}
function emptyLine(text = 'Nothing recorded yet.') {
  return `<div class="muted small" style="padding:8px 0;">${text}</div>`;
}
function renderList(items, fn) {
  if (!items || !items.length) return emptyLine();
  return items.map(i => `<div class="list-item">${fn(i)}</div>`).join('');
}

// ---------- HOME ----------
async function renderHome(root) {
  root.innerHTML = `<p class="muted">Loading your dashboard...</p>`;
  const [accountsCount, companiesCount, proceduresCount, recentEntries] = await Promise.all([
    supabase.from('accounts').select('id', { count: 'exact', head: true }),
    supabase.from('companies').select('id', { count: 'exact', head: true }),
    supabase.from('procedures').select('id', { count: 'exact', head: true }),
    supabase.from('knowledge_entries').select('*').order('created_at', { ascending: false }).limit(5),
  ]);
  const profile = getProfile();
  const firstName = profile?.full_name?.split(' ')[0] || profile?.email?.split('@')[0] || 'there';
  const activityHtml = (recentEntries.data || []).length
    ? recentEntries.data.map(e => `
        <div class="list-item">
          <div>${escapeHtml(e.title)}</div>
          <div class="muted small" style="margin-top:2px;">${e.category.replace('_',' ')} - ${timeAgo(e.created_at)}</div>
        </div>`).join('')
    : `<div class="empty-state"><h3>Nothing logged yet.</h3><p>Add a law, trend, or note from the knowledge log to see it here.</p></div>`;
  root.innerHTML = `
    <h1>Welcome back, ${escapeHtml(firstName)}</h1>
    <p class="muted">Here is what has changed since your last visit.</p>
    <div class="stat-grid">
      <div class="stat-card"><div class="muted small">Accounts</div><div class="value">${accountsCount.count ?? 0}</div></div>
      <div class="stat-card"><div class="muted small">Companies</div><div class="value">${companiesCount.count ?? 0}</div></div>
      <div class="stat-card"><div class="muted small">Procedures</div><div class="value">${proceduresCount.count ?? 0}</div></div>
      <div class="stat-card"><div class="muted small">Knowledge log entries</div><div class="value">${recentEntries.data?.length ?? 0}</div></div>
    </div>
    <div class="section-label">Recent activity</div>
    ${activityHtml}`;
}

// ---------- ACCOUNTS ----------
let activeClassFilter = null;
let currentPage = 0;
let pageSize = 50;
window.__pendingAccountSearch = window.__pendingAccountSearch || null;

async function renderAccounts(root, params) {
  if (params?.id) return renderAccountDetail(root, params.id);
  currentPage = 0;
  const prefill = window.__pendingAccountSearch || '';
  window.__pendingAccountSearch = null;
  root.innerHTML = `
    <h1>Accounts</h1>
    <p class="muted">Search the Norwegian chart of accounts.</p>
    <div class="toolbar" style="margin-top:20px;">
      <input type="search" id="accounts-search" placeholder="Search by number, Norwegian name, or English purpose" value="${escapeHtml(prefill)}" />
      <select id="page-size-select" style="width:auto;">
        <option value="50">50 per page</option>
        <option value="100">100 per page</option>
        <option value="200">200 per page</option>
      </select>
    </div>
    <div class="chip-row" id="class-chips"></div>
    <div id="accounts-list"><p class="muted">Loading accounts...</p></div>
    <div id="pagination-controls" style="display:flex; justify-content:space-between; align-items:center; margin-top:16px;"></div>`;
  const chipRow = root.querySelector('#class-chips');
  const classes = [{ n: null, label: 'All classes' }, { n: 1, label: '1 Assets' }, { n: 2, label: '2 Equity/liab' }, { n: 3, label: '3 Revenue' }, { n: 4, label: '4 COGS' }, { n: 5, label: '5 Payroll' }, { n: 6, label: '6-7 Opex' }, { n: 8, label: '8 Finance/tax' }];
  chipRow.innerHTML = classes.map(c => `<span class="chip ${c.n === activeClassFilter ? 'active' : ''}" data-class="${c.n ?? ''}">${c.label}</span>`).join('');
  chipRow.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeClassFilter = chip.dataset.class ? Number(chip.dataset.class) : null;
      currentPage = 0;
      chipRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      loadAccountsList(root);
    });
  });
  root.querySelector('#accounts-search').addEventListener('input', debounce(() => { currentPage = 0; loadAccountsList(root); }, 300));
  root.querySelector('#page-size-select').value = String(pageSize);
  root.querySelector('#page-size-select').addEventListener('change', (e) => { pageSize = Number(e.target.value); currentPage = 0; loadAccountsList(root); });
  loadAccountsList(root);
}
async function loadAccountsList(root) {
  const listEl = root.querySelector('#accounts-list');
  const paginationEl = root.querySelector('#pagination-controls');
  const searchTerm = root.querySelector('#accounts-search').value.trim();
  let query = supabase.from('accounts').select('id, account_number, name_no, purpose_en, simple_explanation_en, class_number', { count: 'exact' }).eq('is_active', true).order('account_number');
  if (activeClassFilter) query = query.eq('class_number', activeClassFilter);
  if (searchTerm) query = query.or(`account_number.ilike.%${searchTerm}%,name_no.ilike.%${searchTerm}%,purpose_en.ilike.%${searchTerm}%`);
  const from = currentPage * pageSize;
  const to = from + pageSize - 1;
  const { data, error, count } = await query.range(from, to);
  if (error) { listEl.innerHTML = `<p class="error-text">Could not load accounts: ${error.message}</p>`; paginationEl.innerHTML = ''; return; }
  if (!data.length) { listEl.innerHTML = `<div class="empty-state"><h3>No accounts match your search.</h3><p>Try a different account number or keyword.</p></div>`; paginationEl.innerHTML = ''; return; }
  listEl.innerHTML = `<table><thead><tr><th>Konto</th><th>Navn</th><th>Purpose</th></tr></thead><tbody>
    ${data.map(a => `<tr class="row-link" data-id="${a.id}"><td><span class="stamp small">${a.account_number}</span></td><td>${escapeHtml(a.name_no)}</td><td class="muted">${escapeHtml(a.simple_explanation_en || a.purpose_en)}</td></tr>`).join('')}
  </tbody></table>`;
  listEl.querySelectorAll('tr.row-link').forEach(row => row.addEventListener('click', () => { window.location.hash = `#/accounts/${row.dataset.id}`; }));

  const totalPages = Math.max(1, Math.ceil((count || 0) / pageSize));
  const showingFrom = from + 1;
  const showingTo = Math.min(from + data.length, count || 0);
  paginationEl.innerHTML = `
    <span class="muted small">Showing ${showingFrom}-${showingTo} of ${count ?? 0}</span>
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="btn-ghost small" id="prev-page" ${currentPage === 0 ? 'disabled' : ''}>&larr; Previous</button>
      <span class="muted small">Page ${currentPage + 1} of ${totalPages}</span>
      <button class="btn-ghost small" id="next-page" ${currentPage + 1 >= totalPages ? 'disabled' : ''}>Next &rarr;</button>
    </div>`;
  paginationEl.querySelector('#prev-page')?.addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadAccountsList(root); } });
  paginationEl.querySelector('#next-page')?.addEventListener('click', () => { if (currentPage + 1 < totalPages) { currentPage++; loadAccountsList(root); } });
}
async function renderAccountDetail(root, accountId) {
  root.innerHTML = `<p class="muted">Loading account...</p>`;
  const [accountRes, examplesRes, requirementsRes, auditRes, lawRefsRes, proceduresRes, companiesRes] = await Promise.all([
    supabase.from('accounts').select('*, account_classes(name_no, name_en), vat_codes(name_en, rate_percent), saf_t_codes(code)').eq('id', accountId).single(),
    supabase.from('account_examples').select('*').eq('account_id', accountId).order('order_index'),
    supabase.from('account_requirements').select('*, law_articles(paragraph_no, laws(short_name_no, full_name_en))').eq('account_id', accountId),
    supabase.from('account_audit_requirements').select('*').eq('account_id', accountId),
    supabase.from('account_law_references').select('law_articles(id, paragraph_no, title_en, summary_en, laws(id, short_name_no, full_name_en, official_url))').eq('account_id', accountId),
    supabase.from('procedure_related_accounts').select('procedures(id, title_en, category)').eq('account_id', accountId),
    hasRole('senior') ? supabase.from('company_effective_accounts').select('*').eq('account_id', accountId) : Promise.resolve({ data: [] }),
  ]);
  if (accountRes.error || !accountRes.data) { root.innerHTML = `<p class="error-text">Account not found.</p><a href="#/accounts">Back to accounts</a>`; return; }
  const a = accountRes.data;
  root.innerHTML = `
    <a href="#/accounts" class="muted small">&larr; Back to accounts</a>
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-top:16px; padding-bottom:16px; border-bottom:1px solid var(--border);">
      <div>
        <span class="badge badge-class">${a.account_classes ? `Class ${a.class_number} - ${a.account_classes.name_en}` : `Class ${a.class_number}`}</span>
        <h1 style="margin-top:10px;"><span class="stamp large">${a.account_number}</span> ${escapeHtml(a.name_no)}</h1>
        ${a.simple_explanation_en ? `<p style="margin-top:8px; font-size:15px;">${escapeHtml(a.simple_explanation_en)}</p>` : ''}
        <p class="muted small" style="margin-top:6px;"><span style="font-weight:500;">In accounting terms:</span> ${escapeHtml(a.purpose_en)}</p>
      </div>
      <div class="muted small" style="text-align:right;">
        <p>VAT: ${a.vat_codes ? `${escapeHtml(a.vat_codes.name_en)} (${a.vat_codes.rate_percent}%)` : 'not applicable'}</p>
        <p>SAF-T: ${a.saf_t_codes ? escapeHtml(a.saf_t_codes.code) : 'not mapped'}</p>
      </div>
    </div>
    <div class="detail-grid">
      <div>
        <div class="section-label">Example transactions</div>
        ${renderList(examplesRes.data, e => e.example_en)}
        <div class="section-label" style="margin-top:20px;">Bookkeeping requirements</div>
        ${renderList(requirementsRes.data, r => `${escapeHtml(r.description_en)} ${r.law_articles ? `<div class="law-ref">${escapeHtml(r.law_articles.laws?.short_name_no || '')} ${escapeHtml(r.law_articles.paragraph_no || '')}</div>` : ''}`)}
        <div class="section-label" style="margin-top:20px;">Audit checkpoints</div>
        ${(auditRes.data || []).map(x => `<div class="list-item"><div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;"><div>${escapeHtml(x.description_en)}</div><span class="badge badge-${x.risk_level}">${x.risk_level}</span></div>${x.isa_standard_ref ? `<div class="muted small" style="margin-top:4px;">${escapeHtml(x.isa_standard_ref)}</div>` : ''}</div>`).join('') || emptyLine()}
      </div>
      <div>
        <div class="section-label">Law references</div>
        ${(lawRefsRes.data || []).map(x => `
          <div class="list-item">
            <div>${escapeHtml(x.law_articles?.title_en || x.law_articles?.paragraph_no || '')}</div>
            <div class="muted small" style="margin-top:4px;">${escapeHtml(x.law_articles?.summary_en || '')}</div>
            <div style="margin-top:6px; display:flex; gap:12px;">
              ${x.law_articles?.laws?.id ? `<a href="#/laws/${x.law_articles.laws.id}" class="small">Read full ${escapeHtml(x.law_articles.laws.short_name_no || 'law')} in English</a>` : ''}
              ${x.law_articles?.laws?.official_url ? `<a href="${escapeHtml(x.law_articles.laws.official_url)}" target="_blank" rel="noopener" class="small">Official Norwegian text</a>` : ''}
            </div>
          </div>
        `).join('') || emptyLine()}
        <div class="section-label" style="margin-top:20px;">Linked procedures</div>
        ${(proceduresRes.data || []).map(x => `<div class="list-item">${escapeHtml(x.procedures?.title_en || '')}</div>`).join('') || emptyLine()}
        ${hasRole('senior') ? `<div class="section-label" style="margin-top:20px;">Companies using this account</div>${(companiesRes.data || []).map(x => `<div class="list-item">${escapeHtml(x.company_id)}</div>`).join('') || emptyLine('No companies linked yet.')}` : ''}
      </div>
    </div>`;
}

// ---------- COMPANIES ----------
async function renderCompanies(root, params) {
  if (params?.id) return renderCompanyDetail(root, params.id);
  const canWrite = hasRole('senior');
  root.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div><h1>Companies</h1><p class="muted">Search for a company to see its accounts and invoice contact.</p></div>

    <div id="company-list"><p class="muted">Loading companies...</p></div>`;

  loadCompanyList(root);
}
async function loadCompanyList(root) {
  const listEl = root.querySelector('#company-list');
  const term = root.querySelector('#company-search').value.trim();
  let query = supabase.from('companies').select('id, name, org_number, industry').eq('is_active', true).order('name');
  if (term) query = query.or(`name.ilike.%${term}%,org_number.ilike.%${term}%`);
  const { data, error } = await query.limit(100);
  if (error) { listEl.innerHTML = `<p class="error-text">${error.message}</p>`; return; }
  if (!data.length) { listEl.innerHTML = `<div class="empty-state"><h3>No companies found.</h3><p>Add one to get started.</p></div>`; return; }
  listEl.innerHTML = `<table><thead><tr><th>Company</th><th>Org number</th><th>Industry</th></tr></thead><tbody>
    ${data.map(c => `<tr class="row-link" data-id="${c.id}"><td>${escapeHtml(c.name)}</td><td class="muted">${escapeHtml(c.org_number || '-')}</td><td class="muted">${escapeHtml(c.industry || '-')}</td></tr>`).join('')}
  </tbody></table>`;
  listEl.querySelectorAll('tr.row-link').forEach(row => row.addEventListener('click', () => { window.location.hash = `#/companies/${row.dataset.id}`; }));
}

function accountPickerHtml(label, inputId) {
  return `
    <label style="margin-top:16px;">${label}</label>
    <input type="search" id="${inputId}-search" placeholder="Type a number or name" />
    <div id="${inputId}-results" class="muted small" style="margin-top:6px; max-height:120px; overflow-y:auto;"></div>
    <input type="hidden" id="${inputId}-id" />
    <p id="${inputId}-label" class="small" style="margin-top:4px;"></p>
  `;
}
function wireAccountPicker(overlay, inputId, preselectedLabel) {
  if (preselectedLabel) overlay.querySelector(`#${inputId}-label`).textContent = `Selected: ${preselectedLabel}`;
  const search = async () => {
    const term = overlay.querySelector(`#${inputId}-search`).value.trim();
    if (!term) { overlay.querySelector(`#${inputId}-results`).innerHTML = ''; return; }
    const { data } = await supabase.from('accounts').select('id, account_number, name_no').or(`account_number.ilike.%${term}%,name_no.ilike.%${term}%`).eq('is_active', true).limit(10);
    overlay.querySelector(`#${inputId}-results`).innerHTML = (data || []).map(a => `<div class="list-item" style="cursor:pointer; padding:6px 8px;" data-id="${a.id}" data-label="${a.account_number} ${escapeHtml(a.name_no)}"><span class="stamp small">${a.account_number}</span> ${escapeHtml(a.name_no)}</div>`).join('');
    overlay.querySelectorAll(`#${inputId}-results [data-id]`).forEach(el => {
      el.addEventListener('click', () => {
        overlay.querySelector(`#${inputId}-id`).value = el.dataset.id;
        overlay.querySelector(`#${inputId}-label`).textContent = `Selected: ${el.dataset.label}`;
        overlay.querySelector(`#${inputId}-results`).innerHTML = '';
      });
    });
  };
  overlay.querySelector(`#${inputId}-search`).addEventListener('input', debounce(search, 300));
}

async function showBookkeepingNoteModal(root, companyId, noteId) {
  let existing = null;
  if (noteId) {
    const { data } = await supabase.from('company_bookkeeping_notes')
      .select('*, debit:debit_account_id(account_number, name_no), credit:credit_account_id(account_number, name_no)')
      .eq('id', noteId).single();
    existing = data;
  }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="width:480px; max-height:82vh; overflow-y:auto;">
      <h2>${existing ? 'Edit' : 'Add'} bookkeeping note</h2>
      <form id="bk-note-form">
        <label>Title</label>
        <input type="text" id="bk-title" placeholder="e.g. Booking.com commission sales" value="${existing ? escapeHtml(existing.title) : ''}" required />
        ${accountPickerHtml('Debit account', 'bk-debit')}
        ${accountPickerHtml('Credit account', 'bk-credit')}
        <label style="margin-top:16px;">Considerations / things to watch out for</label>
        <textarea id="bk-considerations" rows="3" placeholder="e.g. Booking.com deducts commission before payout - book the gross sale and commission separately, do not net them.">${existing ? escapeHtml(existing.considerations || '') : ''}</textarea>
        <label style="margin-top:12px;">Attachment / screenshot (optional)</label>
        <input type="file" id="bk-attachment" accept="image/*" />
        ${existing?.image_path ? `<p class="muted small" style="margin-top:4px;">An attachment is already saved. Choosing a new file replaces it.</p>` : ''}
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button type="button" class="btn-ghost" id="cancel-bk-note">Cancel</button>
          <button type="submit" class="btn-primary" style="margin-top:0;">Save</button>
        </div>
        <p id="bk-note-error" class="error-text" hidden></p>
      </form>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#cancel-bk-note').addEventListener('click', () => overlay.remove());

  if (existing?.debit_account_id) overlay.querySelector('#bk-debit-id').value = existing.debit_account_id;
  if (existing?.credit_account_id) overlay.querySelector('#bk-credit-id').value = existing.credit_account_id;
  wireAccountPicker(overlay, 'bk-debit', existing?.debit ? `${existing.debit.account_number} ${existing.debit.name_no}` : null);
  wireAccountPicker(overlay, 'bk-credit', existing?.credit ? `${existing.credit.account_number} ${existing.credit.name_no}` : null);

  overlay.querySelector('#bk-note-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = overlay.querySelector('#bk-note-error');
    try {
      let imagePath = existing?.image_path || null;
      const file = overlay.querySelector('#bk-attachment').files[0];
      if (file) {
        imagePath = `company-notes/${companyId}/${Date.now()}-${file.name}`;
        const { error: uploadErr } = await supabase.storage.from('procedure-images').upload(imagePath, file);
        if (uploadErr) throw uploadErr;
      }
      const payload = {
        company_id: companyId,
        title: overlay.querySelector('#bk-title').value.trim(),
        debit_account_id: overlay.querySelector('#bk-debit-id').value || null,
        credit_account_id: overlay.querySelector('#bk-credit-id').value || null,
        considerations: overlay.querySelector('#bk-considerations').value.trim() || null,
        image_path: imagePath,
        created_by: getProfile()?.id,
        updated_at: new Date().toISOString(),
      };
      const { error } = existing
        ? await supabase.from('company_bookkeeping_notes').update(payload).eq('id', existing.id)
        : await supabase.from('company_bookkeeping_notes').insert(payload);
      if (error) throw error;
      overlay.remove();
      renderCompanyDetail(root, companyId);
    } catch (err) {
      errEl.textContent = err.message || 'Could not save this note.';
      errEl.hidden = false;
    }
  });
}

// ---------- LEARN (QUIZ) ----------
let quizQueue = [];
let quizIndex = 0;
let quizScore = { correct: 0, incorrect: 0 };

async function renderLearn(root) {
  root.innerHTML = `<p class="muted">Loading quiz questions...</p>`;
  const { data, error } = await supabase.from('quiz_questions').select('*, accounts(account_number, name_no)').order('created_at');
  if (error) { root.innerHTML = `<p class="error-text">${error.message}</p>`; return; }
  if (!data.length) {
    root.innerHTML = `<div class="empty-state"><h3>No quiz questions yet.</h3><p>Ask your admin to add some, or check back after the next content update.</p></div>`;
    return;
  }
  quizQueue = shuffle([...data]);
  quizIndex = 0;
  quizScore = { correct: 0, incorrect: 0 };
  renderQuizCard(root);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuizCard(root) {
  if (quizIndex >= quizQueue.length) {
    root.innerHTML = `
      <h1>Quiz complete</h1>
      <p class="muted" style="margin-bottom:20px;">You got ${quizScore.correct} right and ${quizScore.incorrect} wrong out of ${quizQueue.length}.</p>
      <button class="btn-primary" style="width:auto;" id="restart-quiz">Start again</button>
    `;
    root.querySelector('#restart-quiz').addEventListener('click', () => renderLearn(root));
    return;
  }
  const q = quizQueue[quizIndex];
  const options = shuffle([q.correct_answer, ...(q.wrong_answers || [])]);
  root.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:16px;">
      <h1>Learn</h1>
      <span class="muted small">Question ${quizIndex + 1} of ${quizQueue.length} - ${quizScore.correct} correct so far</span>
    </div>
    <div class="card">
      ${q.accounts ? `<span class="stamp small">${q.accounts.account_number}</span>` : ''}
      <h3 style="margin-top:10px;">${escapeHtml(q.question_en)}</h3>
      <div id="quiz-options" style="margin-top:16px; display:flex; flex-direction:column; gap:8px;">
        ${options.map(opt => `<button class="btn-ghost quiz-option" data-answer="${escapeHtml(opt)}" style="text-align:left;">${escapeHtml(opt)}</button>`).join('')}
      </div>
      <p id="quiz-feedback" class="small" style="margin-top:12px;" hidden></p>
    </div>
  `;
  root.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', async () => {
      const isCorrect = btn.dataset.answer === q.correct_answer;
      const feedback = root.querySelector('#quiz-feedback');
      feedback.hidden = false;
      feedback.textContent = isCorrect ? 'Correct.' : `Not quite - the correct answer is: ${q.correct_answer}`;
      feedback.style.color = isCorrect ? 'var(--forest)' : 'var(--rust)';
      root.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);
      if (isCorrect) quizScore.correct++; else quizScore.incorrect++;

      const profile = getProfile();
      if (profile) {
        const { data: existing } = await supabase.from('quiz_progress').select('*').eq('profile_id', profile.id).eq('question_id', q.id).maybeSingle?.() ?? { data: null };
        if (existing) {
          await supabase.from('quiz_progress').update({
            correct_count: existing.correct_count + (isCorrect ? 1 : 0),
            incorrect_count: existing.incorrect_count + (isCorrect ? 0 : 1),
            last_attempt_at: new Date().toISOString(),
          }).eq('id', existing.id);
        } else {
          await supabase.from('quiz_progress').insert({
            profile_id: profile.id, question_id: q.id,
            correct_count: isCorrect ? 1 : 0, incorrect_count: isCorrect ? 0 : 1,
            last_attempt_at: new Date().toISOString(),
          });
        }
      }

      setTimeout(() => { quizIndex++; renderQuizCard(root); }, 1200);
    });
  });
}

      <h1>${escapeHtml(l.short_name_no)}</h1>
      <p class="muted" style="margin-top:4px;">${escapeHtml(l.full_name_en)} - ${escapeHtml(l.full_name_no)}</p>
      ${l.official_url ? `<a href="${escapeHtml(l.official_url)}" target="_blank" rel="noopener" class="small">View official text on Lovdata</a>` : ''}
    </div>
    <div class="section-label" style="margin-top:20px;">Articles (${(articlesRes.data || []).length})</div>
    ${(articlesRes.data || []).map(a => `
      <div class="card" style="margin-bottom:10px;">
        <h3>${escapeHtml(a.paragraph_no)} ${a.title_en ? '- ' + escapeHtml(a.title_en) : ''}</h3>
        <p style="margin-top:8px;">${escapeHtml(a.summary_en)}</p>
      </div>
    `).join('') || `<div class="empty-state"><h3>No articles added for this law yet.</h3></div>`}
  `;
}

// ---------- GLOBAL SEARCH (accounts + laws together) ----------
async function renderGlobalSearch(root, params) {
  const term = decodeURIComponent(params?.id || '');
  root.innerHTML = `
    <h1>Search results</h1>
    <div class="toolbar" style="margin-top:20px;"><input type="search" id="global-search-box" placeholder="Search accounts, companies, laws, or procedures" value="${escapeHtml(term)}" /></div>
    <div id="global-search-results"><p class="muted">Searching...</p></div>
  `;
  root.querySelector('#global-search-box').addEventListener('input', debounce(() => {
    const t = root.querySelector('#global-search-box').value.trim();
    window.location.hash = `#/search/${encodeURIComponent(t)}`;
  }, 300));
  await runGlobalSearch(root, term);
}

async function runGlobalSearch(root, term) {
  const resultsEl = root.querySelector('#global-search-results');
  if (!term) { resultsEl.innerHTML = `<p class="muted">Type a term above to search.</p>`; return; }

  const [acctRes, lawRes] = await Promise.all([
    supabase.from('accounts').select('id, account_number, name_no, purpose_en, simple_explanation_en').eq('is_active', true)
      .or(`account_number.ilike.%${term}%,name_no.ilike.%${term}%,purpose_en.ilike.%${term}%`).limit(20),
    supabase.from('law_articles').select('*, laws(id, short_name_no, full_name_en, official_url)')
      .or(`title_en.ilike.%${term}%,summary_en.ilike.%${term}%,title_no.ilike.%${term}%,paragraph_no.ilike.%${term}%`).limit(20),
  ]);

  const accounts = acctRes.data || [];
  const laws = lawRes.data || [];

  resultsEl.innerHTML = `
    <div class="section-label">Accounts (${accounts.length})</div>
    ${accounts.length ? `<table><thead><tr><th>Konto</th><th>Navn</th><th>Purpose</th></tr></thead><tbody>
      ${accounts.map(a => `<tr class="row-link" data-id="${a.id}"><td><span class="stamp small">${a.account_number}</span></td><td>${escapeHtml(a.name_no)}</td><td class="muted">${escapeHtml(a.simple_explanation_en || a.purpose_en)}</td></tr>`).join('')}
    </tbody></table>` : `<p class="muted small">No matching accounts.</p>`}

    <div class="section-label" style="margin-top:24px;">Law articles (${laws.length})</div>
    ${laws.length ? laws.map(a => `
      <div class="card" style="margin-bottom:10px;">
        <div style="display:flex; justify-content:space-between; align-items:baseline;">
          <h3>${escapeHtml(a.laws?.short_name_no || '')} ${escapeHtml(a.paragraph_no || '')}</h3>
          <a href="#/laws/${a.laws?.id}" class="small" style="margin-right:12px;">View all articles in ${escapeHtml(a.laws?.short_name_no || '')}</a>${a.laws?.official_url ? `<a href="${escapeHtml(a.laws.official_url)}" target="_blank" rel="noopener" class="small">Official source</a>` : ''}
        </div>
        <p class="muted small" style="margin-top:2px;">${escapeHtml(a.title_en || '')}</p>
        <p style="margin-top:8px;">${escapeHtml(a.summary_en)}</p>
      </div>
    `).join('') : `<p class="muted small">No matching law articles.</p>`}
  `;
  resultsEl.querySelectorAll('tr.row-link').forEach(row => {
    row.addEventListener('click', () => { window.location.hash = `#/accounts/${row.dataset.id}`; });
  });
}

// ---------- ROUTER / BOOT ----------
const loginScreen = document.getElementById('login-screen');
const appShell = document.getElementById('app-shell');
const viewRoot = document.getElementById('view-root');
const sidebar = document.getElementById('sidebar');
const routes = { home: renderHome, accounts: renderAccounts, companies: renderCompanies, procedures: renderProcedures, laws: renderLaws, learn: renderLearn, knowledge: renderKnowledge, admin: renderAdmin, search: renderGlobalSearch };

async function boot() {
  const session = await getSession();
  if (session) { await loadProfile(session.user.id); showApp(session.user.email); }
  else showLogin();
}
function showLogin() { loginScreen.hidden = false; appShell.hidden = true; }
function showApp(email) {
  loginScreen.hidden = true; appShell.hidden = false;
  document.getElementById('user-email').textContent = email;
  document.getElementById('nav-admin').style.display = isAdmin() ? 'flex' : 'none';
  router();
}
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  const submitBtn = document.getElementById('login-submit');
  errorEl.hidden = true; submitBtn.textContent = 'Signing in...'; submitBtn.disabled = true;
  try { await signIn(email, password); showApp(email); }
  catch (err) { errorEl.textContent = err.message || 'Could not sign in. Check your email and password.'; errorEl.hidden = false; }
  finally { submitBtn.textContent = 'Sign in'; submitBtn.disabled = false; }
});
document.getElementById('logout-btn').addEventListener('click', async () => { await signOut(); window.location.hash = ''; showLogin(); });
document.getElementById('global-search').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const term = e.target.value.trim();
    if (!term) return;
    const newHash = `#/search/${encodeURIComponent(term)}`;
    const alreadyThere = window.location.hash === newHash;
    window.location.hash = newHash;
    if (alreadyThere) router();
  }
});
async function router() {
  const hash = window.location.hash.replace('#/', '') || 'home';
  const [routeName, id] = hash.split('/');
  const renderFn = routes[routeName] || renderHome;
  sidebar.querySelectorAll('a').forEach(a => a.classList.toggle('active', a.dataset.route === routeName));
  viewRoot.innerHTML = '';
  await renderFn(viewRoot, id ? { id } : undefined);
}
window.addEventListener('hashchange', router);
supabase.auth.onAuthStateChange((event) => { if (event === 'SIGNED_OUT') showLogin(); });
boot();
</script>
